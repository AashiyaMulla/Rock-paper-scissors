<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>😊 Rock Paper Scissors 😊</h1>
      <div class="result-box">
        <p>Your choice : <span>Rock</span></p>
        <p>Computer's choice : <span>Rock</span></p>
        <p class="draw"><span> Result : </span> <span>Draw</span> </p>
      </div>
      <div class="choices">
        <div class="choice">
          🪨
          <p>Rock</p>
        </div>
        <div class="choice">
          📄
          <p>Paper</p>
        </div>
        <div class="choice">
          ✂️
          <p>Scissors</p>
        </div>
      </div>
    </div>
  </body>
</html>
